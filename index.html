<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANU Ai 세미나</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #0f1115;
      color: #ffffff;
      line-height: 1.7;
    }

    .page {
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 48px;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #8d96a7;
      margin-bottom: 16px;
    }

    .title {
      font-size: clamp(36px, 6vw, 68px);
      line-height: 1.12;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .desc {
      max-width: 760px;
      font-size: 18px;
      color: #c7cfdb;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 24px;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:hover {
      transform: translateY(-6px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #9ea6b5;
      font-size: 14px;
      margin-bottom: 36px;
    }

    .card h2 {
      font-size: 28px;
      line-height: 1.25;
      margin-bottom: 12px;
    }

    .card p {
      color: #d5dbe5;
      font-size: 15px;
      line-height: 1.7;
    }

    .detail-box {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      color: #16181d;
      border-radius: 32px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 24px;
      background: #ffffff;
      color: #111318;
      border: 1px solid #d9dee7;
      border-radius: 18px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .back-btn:hover {
      background: #f2f4f7;
    }

    .detail-label {
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #7e8795;
      margin-bottom: 14px;
    }

    .detail-title {
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.15;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .detail-subtitle {
      font-size: 18px;
      color: #5a6270;
      margin-bottom: 32px;
    }

    .detail-content {
      white-space: pre-line;
      font-size: 17px;
      line-height: 1.95;
      color: #22262d;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .page {
        padding: 32px 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: auto;
      }

      .desc {
        font-size: 16px;
      }

      .detail-box {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>
  <section id="homePage" class="page">
    <div class="container">
      <div class="header">
        <div class="label">My Website</div>
        <h1 class="title">ANU Ai Seminar . v1</h1>
        <p class="desc">
          신속한 초안 자료용 AI 프로세스
        </p>
      </div>

      <div class="grid">
        <div class="card" onclick="openTopic(0)">
          <div class="card-top"><span>01</span><span>→</span></div>
          <div>
            <h2>법규검토</h2>
            <p>NotebookLM</p>
          </div>
        </div>

        <div class="card" onclick="openTopic(1)">
          <div class="card-top"><span>02</span><span>→</span></div>
          <div>
            <h2>사이트 분석</h2>
            <p>Gemini</p>
          </div>
        </div>

        <div class="card" onclick="openTopic(2)">
          <div class="card-top"><span>03</span><span>→</span></div>
          <div>
            <h2>매스<br>다이어그램</h2>
            <p>Gemini</p>
          </div>
        </div>

        <div class="card" onclick="openTopic(3)">
          <div class="card-top"><span>04</span><span>→</span></div>
          <div>
            <h2>프로그램 분석</h2>
            <p>Gemieni</p>
          </div>
        </div>

        <div class="card" onclick="openTopic(4)">
          <div class="card-top"><span>05</span><span>→</span></div>
          <div>
            <h2>이미지<br>판넬 생성</h2>
            <p>Gemini</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="detailPage" class="page hidden">
    <div class="container">
      <button class="back-btn" onclick="goHome()">← 메인으로 돌아가기</button>

      <div class="detail-box">
        <div id="detailLabel" class="detail-label">Topic 1</div>
        <h1 id="detailTitle" class="detail-title">주제 1</h1>
        <p id="detailSubtitle" class="detail-subtitle">첫 번째 주제 설명</p>
        <div id="detailContent" class="detail-content"></div>
      </div>
    </div>
  </section>

  <script>
    const topics = [
      {
        label: "Topic 1",
        title: "법규검토",
        subtitle: "Note book LM",
        content: `AI를 활용한 법규검토 방법\n\n문단을 나누어 작성하면 더 보기 좋습니다.\n\n원하시는 만큼 길게 작성할 수 있습니다.`
      },
      {
        label: "Topic 2",
        title: "주제 2",
        subtitle: "두 번째 주제에 대한 간단한 설명",
        content: `여기에 두 번째 주제의 본문을 넣어주세요.\n\n설명, 스토리, 소개 글 등 원하는 형식으로 입력할 수 있습니다.`
      },
      {
        label: "Topic 3",
        title: "주제 3",
        subtitle: "세 번째 주제에 대한 간단한 설명",
        content: `여기에 세 번째 주제의 본문을 넣어주세요.\n\n중요한 문장은 따로 정리해도 좋습니다.`
      },
      {
        label: "Topic 4",
        title: "주제 4",
        subtitle: "네 번째 주제에 대한 간단한 설명",
        content: `여기에 네 번째 주제의 본문을 넣어주세요.\n\n홈페이지 성격에 맞게 자유롭게 수정하시면 됩니다.`
      },
      {
        label: "Topic 5",
        title: "주제 5",
        subtitle: "다섯 번째 주제에 대한 간단한 설명",
        content: `여기에 다섯 번째 주제의 본문을 넣어주세요.\n\n마무리 문장이나 강조 문구를 넣어도 좋습니다.`
      }
    ];

    function openTopic(index) {
      const topic = topics[index];
      document.getElementById("detailLabel").textContent = topic.label;
      document.getElementById("detailTitle").textContent = topic.title;
      document.getElementById("detailSubtitle").textContent = topic.subtitle;
      document.getElementById("detailContent").textContent = topic.content;

      document.getElementById("homePage").classList.add("hidden");
      document.getElementById("detailPage").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goHome() {
      document.getElementById("detailPage").classList.add("hidden");
      document.getElementById("homePage").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>
</html>
